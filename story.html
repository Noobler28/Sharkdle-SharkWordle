<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharkdle Map</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script defer src="achievements.js"></script>
    <script defer src="story.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo">🦈 Sharkdle</div>
        <div id="auth-container" class="auth-container">
            <button onclick="window.location.href='index.html'" class="nav-btn">Home</button>
            <button onclick="window.location.href='practice.html'" class="nav-btn">Practice Mode</button>
            <button onclick="window.location.href='achievements.html'" class="nav-btn">Achievements</button>
        </div>
    </header>

    <section class="hero" style="padding: 60px 20px 30px 20px;">
        <h1>World Map</h1>
        <p class="story-desc">Travel the globe and discover shark species. Complete each area to unlock the next chapter.</p>
    </section>

    <div class="world-map-container">
        <img src="images/storyMode/worldmap.png" alt="World Map" class="world-map-bg">
        <div id="map-pins"></div>
    </div>

    <div id="area-modal" class="modal" style="display:none;">
        <div class="modal-content story-modal-modern">
            <span id="close-modal" class="close">&times;</span>
            <div class="story-modal-header">
                <div class="story-modal-title-group">
                    <div class="story-modal-kicker">Field Briefing</div>
                    <h2 id="modal-title"></h2>
                    <div class="story-modal-area-label"><span class="area-icon">🌊</span> Atlantic Ocean</div>
                    <div class="story-modal-brief">
                        <p id="story-modal-narrative"></p>
                    </div>
                </div>
            </div>
            <div class="story-modal-progress">
                <div class="story-modal-progress-bar-bg">
                    <div id="story-modal-progress-bar" class="story-modal-progress-bar"></div>
                </div>
                <span id="story-modal-progress-label" class="story-modal-progress-label">0/3 Challenges Complete</span>
            </div>
            <div id="challenges-container"></div>
            <div id="pairs-game-container" style="display:none;"></div>
        </div>
    </div>
</body>
</html>
