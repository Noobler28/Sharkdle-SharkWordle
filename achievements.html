<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - Sharkdle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #061a40, #0b3c5d, #0a1f2e);
            color: #fff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(77, 208, 225, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 180, 216, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 1;
        }
        
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(7, 28, 44, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(77, 208, 225, 0.1);
        }
        
        .navbar-logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #4dd0e1, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, #00b4d8, #0088a0);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 180, 216, 0.3);
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .nav-btn i {
            font-size: 14px;
            display: inline;
        }
        
        .nav-btn span {
            font-size: 14px;
            display: inline;
        }
        
        .nav-btn:hover {
            background: linear-gradient(135deg, #0088a0, #006080);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 180, 216, 0.5);
        }
        
        .nav-btn:active {
            transform: translateY(0);
        }
        
        .navbar a {
            color: #aaa;
            text-decoration: none;
            margin-left: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .navbar a:hover {
            color: #4dd0e1;
            text-shadow: 0 0 10px rgba(77, 208, 225, 0.5);
        }
        
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #4dd0e1, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 50px 0 10px 0;
            font-size: 3em;
            font-weight: 800;
            letter-spacing: 2px;
        }
        
        .subtitle {
            text-align: center;
            color: #4dd0e1;
            font-size: 1.05em;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .achievements-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 26px 20px 80px 20px;
        }
        
        .stats-summary {
            text-align: left;
            padding: 24px 26px;
            background:
                radial-gradient(circle at top right, rgba(77, 208, 225, 0.14), transparent 24%),
                linear-gradient(135deg, rgba(8, 25, 38, 0.96), rgba(9, 30, 47, 0.88));
            border-radius: 24px;
            border: 1px solid rgba(77, 208, 225, 0.18);
            margin-bottom: 34px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
            position: relative;
            overflow: hidden;
        }
        
        .stats-summary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(77, 208, 225, 0.03));
            pointer-events: none;
        }
        
        .stats-summary h2 {
            margin-bottom: 18px;
            color: #dffaff;
            font-size: 1.5em;
            letter-spacing: 1px;
            font-weight: 800;
            position: relative;
            z-index: 1;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
            position: relative;
            z-index: 1;
        }
        
        .stat {
            text-align: left;
            padding: 18px 18px 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 0;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(77, 208, 225, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .stat:hover {
            border-color: rgba(77, 208, 225, 0.26);
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
        }
        
        .stat:hover::before {
            opacity: 1;
        }
        
        .stat-value {
            font-size: clamp(2rem, 4vw, 2.6rem);
            font-weight: 800;
            background: linear-gradient(135deg, #4dd0e1, #00b4d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            display: block;
        }
        
        .stat-label {
            font-size: 0.82em;
            color: #9fc8d6;
            margin-top: 4px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .achievement-category {
            margin-bottom: 34px;
        }

        .category-header {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .category-title {
            font-size: 1.8em;
            color: #4dd0e1;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 3px solid rgba(77, 208, 225, 0.4);
            padding-bottom: 15px;
            font-weight: 800;
            position: relative;
            display: inline-block;
        }
        
        .category-title::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #4dd0e1, #00b4d8, transparent);
            width: 100%;
        }

        .category-meta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #c6eff8;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
            margin-bottom: 0;
        }
        
        .achievement-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 14px;
            align-content: start;
            background:
                radial-gradient(circle at top right, rgba(77, 208, 225, 0.1), transparent 24%),
                linear-gradient(135deg, rgba(11, 34, 51, 0.84), rgba(15, 39, 58, 0.72));
            border: 1px solid rgba(77, 208, 225, 0.22);
            border-radius: 22px;
            padding: 18px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            min-height: 100%;
        }
        
        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(77, 208, 225, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .achievement-card:hover::before {
            left: 100%;
        }
        
        .achievement-card:hover {
            border-color: #4dd0e1;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2), inset 0 0 20px rgba(77, 208, 225, 0.08);
            transform: translateY(-4px);
        }
        
        .achievement-card.locked {
            border-color: rgba(255, 255, 255, 0.08);
            opacity: 0.75;
            background:
                linear-gradient(135deg, rgba(33, 39, 48, 0.84), rgba(24, 30, 38, 0.72));
        }
        
        .achievement-card.locked:hover {
            opacity: 0.88;
        }
        
        .achievement-card.unlocked {
            border-color: rgba(76, 175, 80, 0.34);
            background:
                radial-gradient(circle at top right, rgba(76, 175, 80, 0.12), transparent 24%),
                linear-gradient(135deg, rgba(16, 45, 29, 0.84), rgba(14, 38, 28, 0.72));
        }

        .achievement-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .achievement-card.unlocked:hover {
            border-color: #66bb6a;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3), inset 0 0 20px rgba(76, 175, 80, 0.1);
        }
        
        .achievement-media {
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .achievement-icon {
            min-width: 72px;
            min-height: 72px;
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px;
            font-size: 34px;
            line-height: 1;
            text-align: center;
            white-space: nowrap;
            letter-spacing: -0.08em;
            margin-bottom: 0;
            filter: grayscale(100%);
            opacity: 0.4;
            transition: all 0.3s ease;
            border-radius: 22px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .achievement-card.unlocked .achievement-icon {
            filter: grayscale(0%) drop-shadow(0 0 8px rgba(76, 175, 80, 0.6));
            opacity: 1;
            font-size: 38px;
            background: rgba(76, 175, 80, 0.12);
            border-color: rgba(76, 175, 80, 0.22);
        }

        .achievement-content {
            min-width: 0;
        }

        .achievement-content::before {
            content: '';
            display: block;
            width: 42px;
            height: 3px;
            border-radius: 999px;
            background: linear-gradient(90deg, rgba(77,208,225,0.9), rgba(77,208,225,0));
            margin-bottom: 12px;
        }
        
        .achievement-name {
            font-size: 1.12em;
            font-weight: 800;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: 0.5px;
        }
        
        .achievement-description {
            font-size: 0.9em;
            color: #a9c7d3;
            margin-bottom: 0;
            min-height: 0;
            line-height: 1.6;
        }
        
        .achievement-card.unlocked .achievement-description {
            color: #bcefe0;
        }
        
        .achievement-points {
            font-size: 0.82em;
            color: #4dd0e1;
            font-weight: 700;
            background: rgba(77, 208, 225, 0.1);
            padding: 8px 12px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(77, 208, 225, 0.16);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .achievement-card.unlocked .achievement-points {
            background: rgba(76, 175, 80, 0.14);
            color: #9de1a1;
        }
        
        .achievement-side {
            min-width: 0;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .achievement-status {
            font-size: 0.8em;
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        
        .achievement-status.claimed {
            background: rgba(76, 175, 80, 0.3);
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        
        .achievement-status.ready {
            background: rgba(77, 208, 225, 0.14);
            color: #88edff;
            border: 1px solid rgba(77, 208, 225, 0.2);
        }

        .achievement-status.progressing {
            background: rgba(255,255,255,0.08);
            color: #d5eff9;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .achievement-status.locked-pill {
            background: rgba(200, 200, 200, 0.12);
            color: #8e9ca3;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .achievement-claim-btn {
            width: auto;
            min-width: 148px;
            padding: 11px 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #00b4d8, #4dd0e1);
            color: #062232;
            font-weight: 800;
            font-size: 0.82em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 10px 22px rgba(0, 180, 216, 0.22);
        }

        .achievement-claim-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(0, 180, 216, 0.28);
            filter: brightness(1.04);
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin-top: 14px;
            overflow: hidden;
            border: 1px solid rgba(77, 208, 225, 0.2);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, #4dd0e1);
            border-radius: 4px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px rgba(77, 208, 225, 0.5);
        }
        
        button[style*="background: linear-gradient(135deg, #00b4d8"]  {
            box-shadow: 0 4px 15px rgba(77, 208, 225, 0.2);
        }
        
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 15px;
                gap: 8px;
            }

            .navbar-logo {
                font-size: 22px;
                flex: 0 0 auto;
            }

            .navbar nav {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 6px;
            }

            .nav-btn {
                flex: 1;
                min-width: 45px;
                padding: 6px 4px;
                font-size: 9px;
                margin-left: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                line-height: 1;
            }
            .nav-btn i {
                font-size: 14px;
            }
            .nav-btn span {
                font-size: 8px;
            }

            h1 {
                font-size: 2.2em;
                margin: 30px 0 5px 0;
            }

            .subtitle {
                font-size: 0.95em;
                margin-bottom: 30px;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .achievement-card {
                padding: 18px;
            }

            .achievement-icon {
                min-width: 58px;
                min-height: 58px;
                padding: 8px 10px;
                font-size: 26px;
            }

            .achievement-card.unlocked .achievement-icon {
                font-size: 30px;
            }

            .stats-summary {
                padding: 20px;
                margin-bottom: 28px;
            }

            .category-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-summary h2 {
                font-size: 1.5em;
                margin-bottom: 25px;
            }

            .stat {
                min-width: 160px;
                padding: 24px 25px;
            }

            .stat-value {
                font-size: 2.3em;
            }

            .stat-label {
                font-size: 0.9em;
            }

            .stats-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
        
        @media (max-width: 480px) {
            .navbar {
                flex-direction: row;
                align-items: center;
                padding: 10px 12px;
                gap: 8px;
                justify-content: space-between;
            }

            .navbar-logo {
                font-size: 18px;
                flex-shrink: 0;
            }

            .navbar nav {
                display: flex;
                flex-direction: row;
                gap: 3px;
                flex-wrap: nowrap;
                min-width: 0;
            }

            .nav-btn {
                padding: 4px 6px;
                min-height: 32px;
                font-size: 8px;
                margin-left: 0;
                flex: 1;
                min-width: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 2px;
                line-height: 1;
            }
            .nav-btn i {
                font-size: 12px;
            }
            .nav-btn span {
                font-size: 8px;
            }

            .achievements-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .achievement-card {
                gap: 14px;
                padding: 16px;
            }

            .achievement-side {
                align-items: flex-start;
            }

            .achievement-icon {
                min-width: 54px;
                min-height: 54px;
                padding: 8px 9px;
                font-size: 24px;
            }

            .achievement-title {
                font-size: 14px;
            }

            .achievement-desc {
                font-size: 12px;
            }

            .stats-summary {
                padding: 18px;
                margin: 0 0 28px 0;
                border-radius: 16px;
            }

            .stats-summary h2 {
                font-size: 1.45em;
                margin-bottom: 28px;
                letter-spacing: 1.2px;
                font-weight: 800;
            }

            .stats-row {
                flex-direction: column;
                gap: 18px;
            }

            .stat {
                padding: 28px 22px;
                min-width: auto;
                width: 100%;
                border-radius: 15px;
                min-height: 100px;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .stat:active {
                transform: scale(0.98);
            }

            .stat-value {
                font-size: 2.4em;
                margin-bottom: 8px;
            }

            .stat-label {
                font-size: 0.88em;
                margin-top: 10px;
            }
            
            .category-title {
                font-size: 1.4em;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 360px) {
            .stats-summary {
                padding: 28px 16px;
                margin: 16px 8px 40px 8px;
            }

            .stats-summary h2 {
                font-size: 1.3em;
                margin-bottom: 24px;
            }

            .stats-row {
                gap: 16px;
            }

            .stat {
                padding: 26px 18px;
                min-height: 95px;
            }

            .stat-value {
                font-size: 2.2em;
            }

            .stat-label {
                font-size: 0.82em;
                letter-spacing: 0px;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <header class="navbar">
            <div class="navbar-logo">🦈 Sharkdle</div>
            <nav>
                <button onclick="navigate('index.html')" class="nav-btn" title="Home"><i class="fas fa-home"></i><span>Home</span></button>
                <button onclick="navigate('library.html')" class="nav-btn" title="Library"><i class="fas fa-fish"></i><span>Library</span></button>
                <button onclick="navigate('sharkpass.html')" class="nav-btn" title="Shark Pass"><i class="fas fa-id-card"></i><span>Pass</span></button>
                <button onclick="navigate('leaderboards.html')" class="nav-btn" title="Leaderboards"><i class="fas fa-ranking-star"></i><span>Board</span></button>
            </nav>
        </header>
        
        <div class="achievements-container">
            <div class="stats-summary">
                <h2>Your Progress</h2>
                <div class="stats-row">
                    <div class="stat">
                        <div class="stat-value" id="achievement-count">0</div>
                        <div class="stat-label">Achievements Unlocked</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="achievement-points">0</div>
                        <div class="stat-label">XP Earned</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="achievement-percentage">0%</div>
                        <div class="stat-label">Completion</div>
                    </div>
                </div>
            </div>
            
            <div id="achievements-content"></div>
        </div>
    </div>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="sharks.js"></script>
    <script src="script.js"></script>
    <script src="achievements.js"></script>
    
    <script>
        function navigate(page) {
            window.location.href = page;
        }
    </script>
<script src="global-broadcast.js"></script>
</body>
</html>
